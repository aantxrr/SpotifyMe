<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotifyMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center font-sans">

    <div class="max-w-md w-full mx-4">
        
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 mb-6 shadow-xl">
            <div class="flex items-center gap-3 mb-3">
                <i class="fa-solid fa-folder-plus text-emerald-400 text-xl"></i>
                <h2 class="text-lg font-bold">Automatyczny folder</h2>
            </div>
            <p class="text-sm text-zinc-400 mb-3 leading-relaxed">
                Wszystkie utwory pobierają się bezpośrednio do nowego folderu <span class="text-emerald-400 font-bold">Pobrane/SpotifyMe</span>.
            </p>
            <p class="text-xs text-zinc-500 leading-relaxed">
                Wystarczy, że w ustawieniach Spotify (sekcja "Pliki lokalne") klikniesz <strong>"Dodaj źródło"</strong> i wybierasz raz ten folder <strong>SpotifyMe</strong>. Każdy nowy utwór od razu tam wskoczy!
            </p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl text-center">
            <div class="flex justify-center mb-4">
                <i class="fa-brands fa-spotify text-emerald-400 text-5xl animate-pulse"></i>
            </div>
            <h1 class="text-3xl font-black mb-6 tracking-tight text-emerald-400">SpotifyMe</h1>

            <div class="space-y-4">
                <input type="text" id="yt-url" placeholder="Wklej link z YouTube..." 
                       class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-emerald-500 transition">
                
                <button onclick="downloadMusic()" id="btn-download" 
                        class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-3 px-6 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-down"></i> Pobierz utwór
                </button>
            </div>

            <div id="status-container" class="hidden mt-6 space-y-4">
                <div class="flex justify-between items-center text-xs text-zinc-400">
                    <span id="status-text">Rozpoczynanie...</span>
                    <span id="status-percentage" class="font-bold text-emerald-400">0%</span>
                </div>
                <div class="w-full bg-zinc-800 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" class="bg-emerald-500 h-2.5 rounded-full w-0 transition-all duration-300"></div>
                </div>

                <button onclick="cancelDownload()" id="btn-cancel" 
                        class="w-full bg-red-950 hover:bg-red-900 border border-red-800 text-red-200 text-xs py-2 px-4 rounded-lg transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-circle-stop"></i> Zatrzymaj pobieranie
                </button>
            </div>
        </div>
    </div>

    <script>
        let activeEventSource = null;
        let activeAbortController = null;

        async function downloadMusic() {
            const urlInput = document.getElementById('yt-url');
            const url = urlInput.value.trim();
            const statusContainer = document.getElementById('status-container');
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');
            const statusPercentage = document.getElementById('status-percentage');
            const btnDownload = document.getElementById('btn-download');

            if (!url) {
                alert("Proszę wprowadzić link do YouTube!");
                return;
            }

            const downloadId = 'id_' + Math.random().toString(36).substr(2, 9);

            // Przygotowanie do pobierania
            statusContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
            statusPercentage.innerText = '0%';
            statusText.innerText = 'Łączenie z YouTube...';
            btnDownload.disabled = true;
            btnDownload.classList.add('opacity-50', 'cursor-not-allowed');

            // Tworzymy kontroler do zatrzymywania żądania HTTP
            activeAbortController = new AbortController();
            const { signal } = activeAbortController;

            // 1. Otwieramy nasłuchiwanie postępu
            activeEventSource = new EventSource(`/progress/${downloadId}`);
            
            activeEventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                const progress = data.progress;

                if (progress === -1.0) {
                    statusText.innerHTML = '<span class="text-red-500">Wystąpił błąd podczas pobierania.</span>';
                    closeConnections();
                } else {
                    progressBar.style.width = `${progress}%`;
                    statusPercentage.innerText = `${Math.round(progress)}%`;
                    
                    if (progress < 100) {
                        statusText.innerText = 'Pobieranie do folderu SpotifyMe...';
                    } else {
                        statusText.innerText = 'Zapisano w folderze SpotifyMe!';
                        closeConnections();
                    }
                }
            };

            // 2. Wysyłamy żądanie pobrania
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, download_id: downloadId }),
                    signal: signal // Podłączamy sygnał anulowania
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Błąd zapisu.');
                }

                statusText.innerText = 'Utwór jest już w Twoim folderze SpotifyMe!';
                urlInput.value = '';

            } catch (error) {
                if (error.name === 'AbortError') {
                    statusText.innerHTML = '<span class="text-zinc-400">Pobieranie zostało zatrzymane przez użytkownika.</span>';
                } else {
                    statusText.innerHTML = `<span class="text-red-500">Błąd: ${error.message}</span>`;
                }
                closeConnections();
            } finally {
                btnDownload.disabled = false;
                btnDownload.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // Funkcja wywoływana przy kliknięciu "Zatrzymaj pobieranie"
        function cancelDownload() {
            if (activeAbortController) {
                activeAbortController.abort(); // Przerywa wysyłanie pliku
            }
            closeConnections();
            
            const progressBar = document.getElementById('progress-bar');
            const statusPercentage = document.getElementById('status-percentage');
            progressBar.style.width = '0%';
            statusPercentage.innerText = '0%';
        }

        // Pomocnicze zamknięcie strumieni
        function closeConnections() {
            if (activeEventSource) {
                activeEventSource.close();
                activeEventSource = null;
            }
        }
    </script>
</body>
</html>
